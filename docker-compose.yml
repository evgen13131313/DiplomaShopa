 version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app  # Синхронизация папок (чтобы правки кода работали сразу)
      - db_data:/app/db.sqlite3 # Сохранение базы данных
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1

volumes:
  db_data:
